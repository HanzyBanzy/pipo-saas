[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @pipo/types build && pnpm --filter @pipo/db build && pnpm --filter api build"

[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
